 <!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>バーコード読み取り</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h2>📷 バーコード読み取り</h2>

<div id="reader" style="width:300px;"></div>

<button id="scanBtn">▶ スキャン開始</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzGrqCUmPjBPI-x8klsPip8la1BnCAb1rGaloHifOydLKi_GisXJ5YvP2r5usgS0NN8/exec";

let scanner;

document.getElementById("scanBtn").addEventListener("click", startScan);

function startScan() {
  alert("startScan動いた"); // ←ここで確認

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras()
    .then(devices => {
      alert("カメラ数: " + devices.length); // ←ここ重要

      if (devices.length === 0) {
        alert("カメラが見つかりません");
        return;
      }

      const cameraId = devices[0].id;

      scanner.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          onScanSuccess(decodedText);
        }
      );
    })
    .catch(err => {
      alert("カメラ取得エラー：" + err);
    });
}

function onScanSuccess(code) {
  scanner.stop();

  alert("読み取り成功：" + code);

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ code: code })
  })
  .then(() => {
    alert("登録完了");
  })
  .catch(() => {
    alert("送信エラー");
  });
}
</script>

</body>
</html>
