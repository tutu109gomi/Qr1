<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzGrqCUmPjBPI-x8klsPip8la1BnCAb1rGaloHifOydLKi_GisXJ5YvP2r5usgS0NN8/exec";
  // ←差し替え

let scanner;

function startScan() {
  scanner = new Html5Qrcode("reader");
scanner.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  (decodedText) => onScanSuccess(decodedText)
);

        cameraId,
        {
          fps: 10,

        },

        }
      );
    }
  }).catch(err => {
    alert("カメラ起動エラー：" + err);
  });
}

function onScanSuccess(code) {
  scanner.stop();

  // ピッ音
  const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
  audio.play();

  // 送信
  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ code: code })
  })
  .then(() => {
    alert("登録完了：" + code);
  })
  .catch(() => {
    alert("送信エラー");
  });
}
</script>
